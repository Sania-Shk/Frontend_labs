<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="index.css" />
    <title>Pokemon Fetching</title>
  </head>
  <body>
    <div class="container">
      <div class="box">
        <!-- Dummy box for opacity -->
      </div>
      <div class="innercontainer">
        <h2 id="heading">Pokemon Search</h2>
        <div class="user_input">
          <input type="text" id="pokemonID" placeholder="enter pokemon name" />
          <button id="submitBtn" onclick="getData()">search</button> <br />
        </div>
        <br />

        <div class="outerCover">
          <div class="details">
            <div class="image">
              <span id="spann">
                <p class="poki_Detail poki_name" id="nameId"></p>
                <p class="poki_Detail poki_id" id="pokiID"></p>
              </span>

              <img
                src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png"
                alt="Pokemon_spirit"
                id="pokemonSpirit"
                class="pokemon_img"
              />
            </div>
            <div class="data_detail">
              <div class="poki_top_detail">
                <p class="poki_Detail" id="weightId">weight</p>
                <p class="poki_Detail" id="heightId">height</p>
              </div>

              <div class="poki_bottom_detail">
                <p class="poki_Detail" id="paraId">
                  Pokemon Lorem ipsum dolor, sit amet Lorem, ipsum. elit.Pokemon
                  deleniti aut voluptate!
                </p>
                <div class="sepline"></div>
                <div class="bottomdetail">
                  <p class="poki_Detail" id="AbilityId">ability</p>
                  <p class="poki_Detail" id="TypesId">Type</p>
                </div>
                <div class="sepline"></div>
                <p class="poki_Detail" id="paraId">
                  Pokemon Lorem adipisicing elit. Lorem, ipsum.
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
